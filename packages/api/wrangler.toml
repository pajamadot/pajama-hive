name = "hive-api"
main = "src/index.ts"
compatibility_date = "2025-03-19"
compatibility_flags = ["nodejs_compat"]

# Custom domain
routes = [{ pattern = "hive-api.pajamadot.com", custom_domain = true }]

# Hyperdrive binding for Neon Postgres
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "e5677cabce904563b94921b8838e15d6"

# Durable Objects
[[durable_objects.bindings]]
name = "WS_ROOM"
class_name = "WsRoom"

[[durable_objects.bindings]]
name = "ORCHESTRATOR"
class_name = "Orchestrator"

[[durable_objects.bindings]]
name = "META_OBSERVER"
class_name = "MetaObserverDO"

# Migrations for Durable Objects
[[migrations]]
tag = "v1"
new_classes = ["WsRoom", "Orchestrator"]

[[migrations]]
tag = "v2"
new_classes = ["MetaObserverDO"]

[vars]
ENVIRONMENT = "development"
