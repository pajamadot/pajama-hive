name = "hive-api"
main = "src/index.ts"
compatibility_date = "2025-03-19"
compatibility_flags = ["nodejs_compat"]

# Custom domain
routes = [{ pattern = "hive-api.pajamadot.com", custom_domain = true }]

# Hyperdrive binding for Neon Postgres
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "a2e07a49147448029c5ba139fcf5e890"

# Durable Objects
[[durable_objects.bindings]]
name = "WS_ROOM"
class_name = "WsRoom"

[[durable_objects.bindings]]
name = "ORCHESTRATOR"
class_name = "Orchestrator"

# Migrations for Durable Objects
[[migrations]]
tag = "v1"
new_classes = ["WsRoom", "Orchestrator"]

[vars]
ENVIRONMENT = "development"
